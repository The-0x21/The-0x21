<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>0x21 · Arch Terminal · Certifications CLI</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c10;
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, #0a0c15, #020308);
      z-index: -2;
    }

    .bg-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    .glow-1 {
      position: absolute;
      top: 20%;
      left: 10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.12), transparent 70%);
      border-radius: 50%;
      filter: blur(60px);
      animation: floatGlow 12s ease-in-out infinite;
    }

    .glow-2 {
      position: absolute;
      bottom: 10%;
      right: 5%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.1), transparent 70%);
      border-radius: 50%;
      filter: blur(70px);
      animation: floatGlow 15s ease-in-out infinite reverse;
    }

    @keyframes floatGlow {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
      50% { transform: translate(30px, -20px) scale(1.1); opacity: 0.8; }
    }

    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .terminal-container {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .terminal-window {
      width: 95%;
      max-width: 1400px;
      height: 92vh;
      background: rgba(5, 8, 14, 0.94);
      backdrop-filter: blur(16px);
      border-radius: 1.5rem;
      border: 1px solid rgba(56, 189, 248, 0.4);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .terminal-header {
      background: rgba(12, 16, 24, 0.9);
      padding: 0.8rem 1.2rem;
      border-bottom: 1px solid rgba(56, 189, 248, 0.3);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-shrink: 0;
    }

    .window-controls {
      display: flex;
      gap: 0.5rem;
    }

    .window-control {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .close { background: #ff5f56; }
    .minimize { background: #ffbd2e; }
    .maximize { background: #27c93f; }

    .terminal-title {
      color: #6c7a92;
      font-size: 0.75rem;
      flex: 1;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .terminal-body {
      padding: 1.5rem;
      flex: 1;
      overflow-y: auto;
      font-size: 0.85rem;
      line-height: 1.6;
      scroll-behavior: smooth;
    }

    .terminal-body::-webkit-scrollbar {
      width: 8px;
    }
    .terminal-body::-webkit-scrollbar-track {
      background: #0f1219;
    }
    .terminal-body::-webkit-scrollbar-thumb {
      background: #2d4a6e;
      border-radius: 10px;
    }

    .line {
      margin-bottom: 0.5rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .prompt {
      color: #38bdf8;
      font-weight: 600;
    }

    .command {
      color: #eef2ff;
    }

    .output {
      color: #9aa9c1;
      margin-left: 1rem;
      border-left: 2px solid rgba(56, 189, 248, 0.3);
      padding-left: 1rem;
    }

    /* Estilo para el pre del logo */
    .arch-logo-pre {
      color: #38bdf8;
      background: transparent;
      border: none;
      font-family: monospace;
      font-size: 0.6rem;
      text-align: center;
      margin: 0 auto;
      display: block;
      line-height: 1.2;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 1rem;
      background-color: #38bdf8;
      vertical-align: middle;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 5px #38bdf8;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .cert-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      margin: 1.5rem 0;
    }

    .cert-card {
      background: rgba(8, 12, 18, 0.85);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 1rem;
      padding: 1.2rem;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .cert-card:hover {
      transform: translateY(-4px);
      border-color: #38bdf8;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.25);
      background: rgba(12, 18, 26, 0.95);
    }

    .cert-logo {
      width: 70px;
      height: 70px;
      margin: 0 auto 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(56, 189, 248, 0.1);
      border-radius: 50%;
      padding: 0.5rem;
      overflow: hidden;
    }

    .cert-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .cert-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 0.3rem;
    }

    .cert-status {
      font-size: 0.7rem;
      color: #facc15;
      background: rgba(250, 204, 21, 0.1);
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
    }

    .cert-progress {
      margin-top: 0.8rem;
      height: 4px;
      background: #1e2a3a;
      border-radius: 4px;
      overflow: hidden;
    }

    .cert-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #c084fc);
      width: 0%;
      border-radius: 4px;
      transition: width 1s ease;
    }

    .cert-detail-box {
      background: rgba(8, 12, 18, 0.6);
      border: 1px solid #38bdf8;
      border-radius: 1rem;
      margin: 1rem 0;
      overflow: hidden;
    }

    .cert-detail-header {
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(192, 132, 252, 0.1));
      padding: 0.8rem 1.2rem;
      border-bottom: 1px solid #38bdf8;
    }

    .cert-detail-header h3 {
      color: #38bdf8;
      font-size: 1.1rem;
    }

    .cert-detail-section {
      padding: 0.8rem 1.2rem;
      border-bottom: 1px solid rgba(56, 189, 248, 0.15);
    }

    .cert-detail-section:last-child {
      border-bottom: none;
    }

    .section-label {
      color: #c084fc;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tech-tag {
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.7rem;
      display: inline-block;
      margin: 0.2rem;
    }

    .knowledge-item {
      color: #9aa9c1;
      font-size: 0.8rem;
      margin: 0.3rem 0;
      padding-left: 1rem;
      position: relative;
    }

    .knowledge-item::before {
      content: '>';
      position: absolute;
      left: 0;
      color: #38bdf8;
    }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: #6c7a92;
      text-decoration: none;
      font-size: 0.75rem;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #38bdf8;
    }

    @media (max-width: 768px) {
      .terminal-container { padding: 0.5rem; }
      .terminal-body { padding: 1rem; font-size: 0.7rem; }
      .cert-name { font-size: 1rem; }
      .cert-logo { width: 50px; height: 50px; }
      .arch-logo-pre { font-size: 0.4rem; }
    }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>
  <div class="bg-glow">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>
  <canvas id="particle-canvas"></canvas>

  <div class="terminal-container">
    <div class="terminal-window">
      <div class="terminal-header">
        <div class="window-controls">
          <div class="window-control close"></div>
          <div class="window-control minimize"></div>
          <div class="window-control maximize"></div>
        </div>
        <div class="terminal-title">0x21@archiso ~/certifications — CLI knowledge base</div>
      </div>
      
      <div class="terminal-body" id="terminalBody"></div>
    </div>
  </div>

  <script>
    // ========== PARTICLES BACKGROUND ==========
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.25;
        this.vy = (Math.random() - 0.5) * 0.18;
        this.size = Math.random() * 2;
        this.alpha = Math.random() * 0.3 + 0.1;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0) this.x = width;
        if (this.x > width) this.x = 0;
        if (this.y < 0) this.y = height;
        if (this.y > height) this.y = 0;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(56, 189, 248, ${this.alpha})`;
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < 80; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, width, height);
      for (let p of particles) {
        p.update();
        p.draw();
      }
      requestAnimationFrame(animateParticles);
    }

    initParticles();
    animateParticles();

    // ========== ASCII ARCH LOGO (EL PRE QUE DISTE) ==========
    const archLogoText = `                   -`
                  .o+`
                 \`ooo/
                \`+oooo:
               \`+oooooo:
               -+oooooo+:
             \`/:-:++oooo+:
            \`/++++/+++++++:
           \`/++++++++++++++:
          \`/+++ooooooooooooo/\`
         ./ooosssso++osssssso+\`
        .oossssso-\`\`\`\`/ossssss+\`
       -osssssso.      :ssssssso.
      :osssssss/        osssso+++.
     /ossssssss/        +ssssooo/-
   \`/ossssso+/:-        -:/+osssso+-
  \`+sso+:-\`                 \`.-/+oso:
 \`++:.                           \`-/+/
 .\`                                 \`/`;

    // ========== CERTIFICATION DATA ==========
    const certsData = {
      ccna: {
        name: 'CCNA',
        vendor: 'Cisco',
        logo: 'cisco-logo.jpg',
        progress: 45,
        complexity: 'Intermediate',
        estimated: 'Q3 2026',
        color: '#38bdf8',
        technologies: ['Cisco IOS', 'OSPF/EIGRP/BGP', 'VLANs/Trunking', 'IPv4/IPv6', 'NAT/ACLs', 'Python Automation', 'Wireshark'],
        knowledge: [
          'Network fundamentals and OSI model',
          'Ethernet switching and VLAN configuration',
          'IP routing and dynamic routing protocols',
          'Network security fundamentals',
          'WAN technologies and VPN basics',
          'Network automation with Python'
        ]
      },
      ccnp: {
        name: 'CCNP',
        vendor: 'Cisco',
        logo: 'cisco-logo.jpg',
        progress: 25,
        complexity: 'Advanced',
        estimated: 'Q3 2027',
        color: '#c084fc',
        technologies: ['Advanced OSPF/EIGRP/BGP', 'MPLS', 'DMVPN/FlexVPN', 'QoS', 'Cisco SD-WAN', 'Netmiko/NAPALM'],
        knowledge: [
          'Advanced routing and redistribution',
          'BGP route selection and manipulation',
          'MPLS and L3 VPNs',
          'Advanced switching (VXLAN, EVPN)',
          'Network programmability',
          'Cisco SD-WAN architecture'
        ]
      },
      oscp: {
        name: 'OSCP',
        vendor: 'Offensive Security',
        logo: 'oscp-logo.png',
        progress: 60,
        complexity: 'Advanced',
        estimated: 'Q1 2027',
        color: '#f97316',
        technologies: ['Kali Linux', 'Nmap', 'Metasploit', 'Burp Suite', 'Python Exploit Dev', 'Bash', 'Privilege Escalation'],
        knowledge: [
          'Penetration testing methodologies',
          'Reconnaissance and OSINT',
          'Network scanning and enumeration',
          'Web application security (OWASP Top 10)',
          'Buffer overflow exploitation',
          'Windows/Linux privilege escalation',
          'Post-exploitation and pivoting'
        ]
      },
      security: {
        name: 'CompTIA Security+',
        vendor: 'CompTIA',
        logo: 'comptia-logo.jpg',
        progress: 35,
        complexity: 'Intermediate',
        estimated: 'Q4 2026',
        color: '#10b981',
        technologies: ['Firewalls', 'IDS/IPS', 'SIEM (Splunk)', 'PKI/SSL/TLS', 'VPN', 'Linux/Windows Security', 'Nessus'],
        knowledge: [
          'Threats, vulnerabilities and attacks',
          'Identity and access management (IAM)',
          'Risk management and compliance',
          'Cryptography and PKI',
          'Network security architecture',
          'Incident response and forensics',
          'Security assessments and auditing'
        ]
      }
    };

    // ========== TERMINAL BOOT SEQUENCE ==========
    const terminalBody = document.getElementById('terminalBody');
    
    const bootLines = [
      { type: 'logo', content: archLogoText },
      { type: 'output', content: '' },
      { type: 'output', content: ':: Arch Linux 6.8.1-arch1-1 (tty1)' },
      { type: 'output', content: ':: Starting system initialization...' },
      { type: 'output', content: ':: Loading kernel modules... [OK]' },
      { type: 'output', content: ':: Checking filesystems... [OK]' },
      { type: 'output', content: ':: Mounting filesystems... [OK]' },
      { type: 'output', content: ':: Starting networking services... [OK]' },
      { type: 'output', content: ':: Network interface: eth0 - [UP] 10.0.2.15' },
      { type: 'output', content: ':: Starting system logger... [OK]' },
      { type: 'output', content: ':: Starting cron daemon... [OK]' },
      { type: 'output', content: ':: Starting sshd... [OK]' },
      { type: 'output', content: '' },
      { type: 'prompt', content: 'archiso login: ' },
      { type: 'command', content: 'root' },
      { type: 'output', content: 'Password: ********' },
      { type: 'output', content: '' },
      { type: 'prompt', content: 'Last login: ' + new Date().toLocaleString() + ' on tty1' },
      { type: 'output', content: '' },
      { type: 'prompt', content: '[root@archiso ~]# ' },
      { type: 'command', content: 'whoami' },
      { type: 'output', content: 'root' },
      { type: 'prompt', content: '[root@archiso ~]# ' },
      { type: 'command', content: 'hostname' },
      { type: 'output', content: 'archiso' },
      { type: 'prompt', content: '[root@archiso ~]# ' },
      { type: 'command', content: 'uname -a' },
      { type: 'output', content: 'Linux archiso 6.8.1-arch1-1 #1 SMP x86_64 GNU/Linux' },
      { type: 'prompt', content: '[root@archiso ~]# ' },
      { type: 'command', content: 'echo "Welcome, 0x21. Loading certification knowledge base..."' },
      { type: 'output', content: 'Welcome, 0x21. Loading certification knowledge base...' },
      { type: 'prompt', content: '[root@archiso ~]# ' },
      { type: 'command', content: './cert_display --interactive' }
    ];

    function addLine(type, content) {
      const lineDiv = document.createElement('div');
      lineDiv.className = 'line';
      
      if (type === 'logo') {
        const pre = document.createElement('pre');
        pre.className = 'arch-logo-pre';
        pre.textContent = content;
        lineDiv.appendChild(pre);
      } else if (type === 'prompt') {
        lineDiv.innerHTML = '<span class="prompt">' + content + '</span><span class="cursor"></span>';
      } else if (type === 'command') {
        lineDiv.innerHTML = '<span class="prompt">[root@archiso ~]# </span><span class="command">' + content + '</span>';
      } else {
        lineDiv.innerHTML = '<span class="output">' + content + '</span>';
      }
      
      terminalBody.appendChild(lineDiv);
      terminalBody.scrollTop = terminalBody.scrollHeight;
      return lineDiv;
    }

    async function typeCommand(element, text, speed) {
      speed = speed || 20;
      const span = element.querySelector('.command');
      if (!span) return;
      
      span.textContent = '';
      for (let i = 0; i < text.length; i++) {
        span.textContent += text[i];
        await new Promise(resolve => setTimeout(resolve, speed));
      }
    }

    function showCertificationsGrid() {
      addLine('output', '');
      addLine('output', '=====================================================================');
      addLine('output', '  CERTIFICATION STATUS REPORT — IN PROGRESS');
      addLine('output', '=====================================================================');
      addLine('output', '');
      
      const gridDiv = document.createElement('div');
      gridDiv.className = 'cert-grid';
      
      const certList = [
        { key: 'ccna', name: 'CCNA', progress: 45, logo: certsData.ccna.logo },
        { key: 'ccnp', name: 'CCNP', progress: 25, logo: certsData.ccnp.logo },
        { key: 'oscp', name: 'OSCP', progress: 60, logo: certsData.oscp.logo },
        { key: 'security', name: 'Security+', progress: 35, logo: certsData.security.logo }
      ];
      
      for (let i = 0; i < certList.length; i++) {
        const cert = certList[i];
        const card = document.createElement('div');
        card.className = 'cert-card';
        card.setAttribute('data-cert', cert.key);
        card.onclick = (function(key) {
          return function() { showCertDetails(key); };
        })(cert.key);
        card.innerHTML = `
          <div class="cert-logo">
            <img src="${cert.logo}" alt="${cert.name} logo" onerror="this.style.display='none';this.parentElement.innerHTML='<div style=\\'font-size:1.8rem;color:#38bdf8;\\'>${cert.name.charAt(0)}</div>'">
          </div>
          <div class="cert-name">${cert.name}</div>
          <span class="cert-status">In Progress</span>
          <div class="cert-progress">
            <div class="cert-progress-bar" style="width: ${cert.progress}%"></div>
          </div>
          <div style="font-size: 0.65rem; margin-top: 0.5rem; color: #6c7a92;">${cert.progress}% complete — click to inspect</div>
        `;
        gridDiv.appendChild(card);
      }
      
      terminalBody.appendChild(gridDiv);
      terminalBody.scrollTop = terminalBody.scrollHeight;
      
      addLine('output', '');
      addLine('output', '=====================================================================');
      addLine('output', '  Select a certification above to view detailed information');
      addLine('output', '=====================================================================');
      addLine('output', '');
      addLine('prompt', '[root@archiso ~]# ');
      addLine('command', './cert_display --waiting-selection');
      addLine('output', '');
      addLine('output', 'System ready. Click on any certification card to display details.');
      addLine('prompt', '[root@archiso ~]# ');
    }

    function showCertDetails(certKey) {
      const cert = certsData[certKey];
      if (!cert) return;
      
      addLine('output', '');
      
      const detailBox = document.createElement('div');
      detailBox.className = 'cert-detail-box';
      
      let techTagsHtml = '';
      for (let i = 0; i < cert.technologies.length; i++) {
        techTagsHtml += '<span class="tech-tag">' + cert.technologies[i] + '</span>';
      }
      
      let knowledgeHtml = '';
      for (let i = 0; i < cert.knowledge.length; i++) {
        knowledgeHtml += '<div class="knowledge-item">' + cert.knowledge[i] + '</div>';
      }
      
      detailBox.innerHTML = `
        <div class="cert-detail-header">
          <h3>[ ${cert.name} — Certification Details ]</h3>
        </div>
        <div class="cert-detail-section">
          <div class="section-label">BASIC INFORMATION</div>
          <div style="display: flex; justify-content: space-between; flex-wrap: wrap;">
            <span style="color:#9aa9c1;">Vendor:</span>
            <span style="color:#eef2ff;">${cert.vendor}</span>
          </div>
          <div style="display: flex; justify-content: space-between; flex-wrap: wrap; margin-top: 0.3rem;">
            <span style="color:#9aa9c1;">Complexity:</span>
            <span style="color: ${cert.color};">${cert.complexity}</span>
          </div>
          <div style="display: flex; justify-content: space-between; flex-wrap: wrap; margin-top: 0.3rem;">
            <span style="color:#9aa9c1;">Progress:</span>
            <span style="color: #facc15;">${cert.progress}% (estimated: ${cert.estimated})</span>
          </div>
          <div class="cert-progress" style="margin-top: 0.8rem;">
            <div class="cert-progress-bar" style="width: ${cert.progress}%"></div>
          </div>
        </div>
        <div class="cert-detail-section">
          <div class="section-label">TECHNOLOGIES / TOOLS</div>
          <div>${techTagsHtml}</div>
        </div>
        <div class="cert-detail-section">
          <div class="section-label">KNOWLEDGE AREAS</div>
          ${knowledgeHtml}
        </div>
      `;
      
      terminalBody.appendChild(detailBox);
      terminalBody.scrollTop = terminalBody.scrollHeight;
      
      addLine('output', '');
      addLine('prompt', '[root@archiso ~]# ');
      addLine('command', 'cat /certifications/' + certKey + '/full_details.log');
      addLine('output', '[INFO] Full specification for ' + cert.name + ' loaded successfully.');
      addLine('prompt', '[root@archiso ~]# ');
      
      const existingBackLink = document.querySelector('.back-link');
      if (!existingBackLink) {
        const backLink = document.createElement('a');
        backLink.href = 'index.html';
        backLink.className = 'back-link';
        backLink.innerHTML = '← Back to portfolio';
        terminalBody.appendChild(backLink);
      }
      
      terminalBody.scrollTop = terminalBody.scrollHeight;
    }

    async function animateTerminal() {
      for (let i = 0; i < bootLines.length; i++) {
        const line = bootLines[i];
        
        if (line.type === 'logo') {
          addLine('logo', line.content);
          await new Promise(resolve => setTimeout(resolve, 200));
        } else if (line.type === 'prompt') {
          addLine('prompt', line.content);
          await new Promise(resolve => setTimeout(resolve, 60));
        } else if (line.type === 'command') {
          const lineElement = addLine('command', '');
          const commandSpan = lineElement.querySelector('.command');
          if (commandSpan) {
            await typeCommand(lineElement, line.content, 15);
          }
          await new Promise(resolve => setTimeout(resolve, 150));
        } else {
          addLine('output', line.content);
          await new Promise(resolve => setTimeout(resolve, 20));
        }
      }
      
      await new Promise(resolve => setTimeout(resolve, 500));
      showCertificationsGrid();
    }

    window.addEventListener('load', function() {
      setTimeout(animateTerminal, 200);
    });
  </script>
</body>
</html>
