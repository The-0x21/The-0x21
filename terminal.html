<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>0x21 · Arch Terminal · Certifications Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c10;
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    /* Fondo dinámico */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, #0a0c15, #020308);
      z-index: -2;
    }

    .bg-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    .glow-1 {
      position: absolute;
      top: 20%;
      left: 10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.12), transparent 70%);
      border-radius: 50%;
      filter: blur(60px);
      animation: floatGlow 12s ease-in-out infinite;
    }

    .glow-2 {
      position: absolute;
      bottom: 10%;
      right: 5%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.1), transparent 70%);
      border-radius: 50%;
      filter: blur(70px);
      animation: floatGlow 15s ease-in-out infinite reverse;
    }

    @keyframes floatGlow {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
      50% { transform: translate(30px, -20px) scale(1.1); opacity: 0.8; }
    }

    /* Canvas partículas */
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Contenedor terminal - MÁS GRANDE */
    .terminal-container {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .terminal-window {
      width: 95%;
      max-width: 1400px;
      height: 92vh;
      background: rgba(5, 8, 14, 0.94);
      backdrop-filter: blur(16px);
      border-radius: 1.5rem;
      border: 1px solid rgba(56, 189, 248, 0.4);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(56, 189, 248, 0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Terminal header */
    .terminal-header {
      background: rgba(12, 16, 24, 0.9);
      padding: 0.8rem 1.2rem;
      border-bottom: 1px solid rgba(56, 189, 248, 0.3);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-shrink: 0;
    }

    .window-controls {
      display: flex;
      gap: 0.5rem;
    }

    .window-control {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .close { background: #ff5f56; }
    .minimize { background: #ffbd2e; }
    .maximize { background: #27c93f; }

    .terminal-title {
      color: #6c7a92;
      font-size: 0.75rem;
      flex: 1;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* Tabs */
    .tabs-container {
      background: rgba(8, 12, 18, 0.95);
      border-bottom: 1px solid rgba(56, 189, 248, 0.2);
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem 1rem 0;
      flex-shrink: 0;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: #8a9bb5;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      border-bottom: 2px solid transparent;
      border-radius: 8px 8px 0 0;
    }

    .tab-btn:hover {
      color: #38bdf8;
      background: rgba(56, 189, 248, 0.1);
    }

    .tab-btn.active {
      color: #38bdf8;
      border-bottom-color: #38bdf8;
      background: rgba(56, 189, 248, 0.05);
    }

    /* Cuerpo de la terminal con scroll */
    .terminal-body {
      padding: 1.5rem;
      flex: 1;
      overflow-y: auto;
      font-size: 0.85rem;
      line-height: 1.6;
      scroll-behavior: smooth;
    }

    .terminal-body::-webkit-scrollbar {
      width: 8px;
    }
    .terminal-body::-webkit-scrollbar-track {
      background: #0f1219;
    }
    .terminal-body::-webkit-scrollbar-thumb {
      background: #2d4a6e;
      border-radius: 10px;
    }

    /* Líneas de la terminal */
    .line {
      margin-bottom: 0.5rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .prompt {
      color: #38bdf8;
      font-weight: 600;
    }

    .command {
      color: #eef2ff;
    }

    .output {
      color: #9aa9c1;
      margin-left: 1rem;
      border-left: 2px solid rgba(56, 189, 248, 0.3);
      padding-left: 1rem;
    }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 8px;
      height: 1rem;
      background-color: #38bdf8;
      vertical-align: middle;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 5px #38bdf8;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Certifications grid */
    .cert-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.2rem;
      margin: 1rem 0;
    }

    .cert-card {
      background: rgba(8, 12, 18, 0.8);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 1rem;
      padding: 1.2rem;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .cert-card:hover {
      transform: translateY(-3px);
      border-color: #38bdf8;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
    }

    .cert-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 0.5rem;
    }

    .cert-status {
      font-size: 0.7rem;
      color: #facc15;
      background: rgba(250, 204, 21, 0.1);
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
    }

    .cert-progress {
      margin-top: 0.8rem;
      height: 4px;
      background: #1e2a3a;
      border-radius: 4px;
      overflow: hidden;
    }

    .cert-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #c084fc);
      width: 0%;
      border-radius: 4px;
      transition: width 1s ease;
    }

    /* Tab content - conocimientos por certificación */
    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .knowledge-section {
      margin-bottom: 2rem;
    }

    .knowledge-title {
      font-size: 1rem;
      color: #38bdf8;
      margin-bottom: 0.8rem;
      border-left: 3px solid #38bdf8;
      padding-left: 0.8rem;
    }

    .complexity-badge {
      display: inline-block;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .complexity-junior { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid #4ade80; }
    .complexity-intermediate { background: rgba(56, 189, 248, 0.2); color: #38bdf8; border: 1px solid #38bdf8; }
    .complexity-advanced { background: rgba(168, 85, 247, 0.2); color: #c084fc; border: 1px solid #c084fc; }
    .complexity-expert { background: rgba(244, 114, 182, 0.2); color: #f472b6; border: 1px solid #f472b6; }

    .tech-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 1rem 0;
    }

    .tech-tag {
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.7rem;
      transition: all 0.2s;
    }

    .tech-tag:hover {
      background: rgba(56, 189, 248, 0.2);
      transform: scale(1.05);
    }

    .knowledge-list {
      list-style: none;
      padding-left: 1rem;
    }

    .knowledge-list li {
      margin-bottom: 0.5rem;
      color: #9aa9c1;
      font-size: 0.8rem;
      position: relative;
      padding-left: 1.2rem;
    }

    .knowledge-list li::before {
      content: '▹';
      position: absolute;
      left: 0;
      color: #38bdf8;
    }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: #6c7a92;
      text-decoration: none;
      font-size: 0.75rem;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #38bdf8;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .terminal-container { padding: 0.5rem; }
      .terminal-body { padding: 1rem; font-size: 0.7rem; }
      .cert-name { font-size: 1rem; }
      .tab-btn { padding: 0.4rem 0.8rem; font-size: 0.65rem; }
    }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>
  <div class="bg-glow">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>
  <canvas id="particle-canvas"></canvas>

  <div class="terminal-container">
    <div class="terminal-window">
      <div class="terminal-header">
        <div class="window-controls">
          <div class="window-control close"></div>
          <div class="window-control minimize"></div>
          <div class="window-control maximize"></div>
        </div>
        <div class="terminal-title">0x21@archiso ~/certifications — knowledge dashboard</div>
      </div>
      
      <!-- Tabs para certificaciones -->
      <div class="tabs-container" id="tabsContainer" style="display: none;">
        <button class="tab-btn" data-tab="ccna">CCNA</button>
        <button class="tab-btn" data-tab="ccnp">CCNP</button>
        <button class="tab-btn" data-tab="oscp">OSCP</button>
        <button class="tab-btn" data-tab="security">Security+</button>
      </div>
      
      <div class="terminal-body" id="terminalBody">
        <!-- El contenido se generará dinámicamente -->
      </div>
    </div>
  </div>

  <script>
    // ========== PARTÍCULAS DE FONDO ==========
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.25;
        this.vy = (Math.random() - 0.5) * 0.18;
        this.size = Math.random() * 2;
        this.alpha = Math.random() * 0.3 + 0.1;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0) this.x = width;
        if (this.x > width) this.x = 0;
        if (this.y < 0) this.y = height;
        if (this.y > height) this.y = 0;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(56, 189, 248, ${this.alpha})`;
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < 80; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, width, height);
      for (let p of particles) {
        p.update();
        p.draw();
      }
      requestAnimationFrame(animateParticles);
    }

    initParticles();
    animateParticles();

    // ========== DATOS DE CERTIFICACIONES ==========
    const certificationsData = {
      ccna: {
        name: 'CCNA',
        complexity: 'Intermediate',
        complexityLevel: 'intermediate',
        progress: 45,
        technologies: ['Cisco IOS', 'Routing Protocols (OSPF, EIGRP, BGP)', 'VLANs & Trunking', 'STP', 'IPv4/IPv6', 'NAT', 'ACLs', 'Network Automation (Python)', 'Wireshark', 'SD-WAN basics'],
        knowledge: [
          'Network fundamentals and OSI model',
          'Ethernet switching and VLAN configuration',
          'IP routing and static/dynamic routing protocols',
          'Network security fundamentals (ACLs, DHCP snooping)',
          'WAN technologies and VPN basics',
          'Network automation with Python and Ansible',
          'Troubleshooting methodologies',
          'Network device management (Cisco DNA Center)'
        ]
      },
      ccnp: {
        name: 'CCNP',
        complexity: 'Advanced',
        complexityLevel: 'advanced',
        progress: 25,
        technologies: ['Advanced OSPF/EIGRP/BGP', 'MPLS', 'VPN Technologies (DMVPN, FlexVPN)', 'QoS', 'Cisco SD-WAN', 'Python Automation (Netmiko, NAPALM)', 'RESTCONF/NETCONF', 'Cisco DNA Center', 'Multicast routing'],
        knowledge: [
          'Advanced routing protocols and redistribution',
          'BGP route selection and manipulation',
          'MPLS and L3 VPNs',
          'Advanced switching (VXLAN, EVPN)',
          'Network programmability and automation',
          'Cisco SD-WAN architecture',
          'Advanced network troubleshooting',
          'Security integration in enterprise networks'
        ]
      },
      oscp: {
        name: 'OSCP',
        complexity: 'Advanced',
        complexityLevel: 'advanced',
        progress: 60,
        technologies: ['Kali Linux', 'Nmap', 'Metasploit', 'Burp Suite', 'Python (exploit dev)', 'Bash', 'PowerShell', 'Windows/Linux priv esc', 'SQLmap', 'Netcat', 'Wireshark', 'Social Engineering Toolkit'],
        knowledge: [
          'Penetration testing methodologies (PTES, OWASP)',
          'Reconnaissance and OSINT techniques',
          'Network scanning and enumeration',
          'Web application security (OWASP Top 10)',
          'Buffer overflow exploitation',
          'Windows and Linux privilege escalation',
          'Post-exploitation and pivoting',
          'Report writing and documentation'
        ]
      },
      security: {
        name: 'CompTIA Security+',
        complexity: 'Intermediate',
        complexityLevel: 'intermediate',
        progress: 35,
        technologies: ['Firewalls (pfSense, iptables)', 'IDS/IPS (Snort)', 'SIEM (Splunk)', 'PKI & SSL/TLS', 'VPN (IPsec, OpenVPN)', 'Linux Security', 'Windows Security', 'Nessus', 'Wireshark', 'Metasploit basics'],
        knowledge: [
          'Threats, vulnerabilities, and attacks',
          'Identity and access management (IAM)',
          'Risk management and compliance (GDPR, HIPAA)',
          'Cryptography and PKI',
          'Network security architecture',
          'Incident response and forensics',
          'Security assessments and auditing',
          'Cloud and virtualization security'
        ]
      }
    };

    // ========== TERMINAL ANIMATION ==========
    const terminalBody = document.getElementById('terminalBody');
    const tabsContainer = document.getElementById('tabsContainer');
    
    const bootLines = [
      { type: 'output', content: ':: Starting Arch Linux initialization...' },
      { type: 'output', content: ':: Loading kernel modules...' },
      { type: 'output', content: ':: Checking filesystems...' },
      { type: 'output', content: ':: Mounting filesystems...' },
      { type: 'output', content: ':: Starting networking services...' },
      { type: 'output', content: ':: Network interface: eth0 - [UP]' },
      { type: 'output', content: ':: DHCP lease acquired: 10.0.2.15' },
      { type: 'output', content: ':: Starting system logger...' },
      { type: 'output', content: ':: Starting cron daemon...' },
      { type: 'output', content: ':: Starting sshd... [OK]' },
      { type: 'output', content: '' },
      { type: 'prompt', content: 'Arch Linux 6.8.1-arch1-1 (tty1)' },
      { type: 'output', content: '' },
      { type: 'prompt', content: 'archiso login: ' },
      { type: 'command', content: 'root' },
      { type: 'output', content: 'Password: ********' },
      { type: 'output', content: '' },
      { type: 'prompt', content: `Last login: ${new Date().toLocaleString()} on tty1` },
      { type: 'output', content: '' },
      { type: 'prompt', content: '[root@archiso ~]# ' },
      { type: 'command', content: 'whoami' },
      { type: 'output', content: 'root' },
      { type: 'prompt', content: '[root@archiso ~]# ' },
      { type: 'command', content: 'hostname' },
      { type: 'output', content: 'archiso' },
      { type: 'prompt', content: '[root@archiso ~]# ' },
      { type: 'command', content: 'uname -a' },
      { type: 'output', content: 'Linux archiso 6.8.1-arch1-1 #1 SMP PREEMPT_DYNAMIC x86_64 GNU/Linux' },
      { type: 'prompt', content: '[root@archiso ~]# ' },
      { type: 'command', content: 'echo "Welcome, 0x21. Loading certification knowledge base..."' },
      { type: 'output', content: 'Welcome, 0x21. Loading certification knowledge base...' },
      { type: 'prompt', content: '[root@archiso ~]# ' },
      { type: 'command', content: './cert_dashboard --load' }
    ];

    let currentLineIndex = 0;
    let isTyping = false;

    function addLine(type, content) {
      const lineDiv = document.createElement('div');
      lineDiv.className = 'line';
      
      if (type === 'prompt') {
        lineDiv.innerHTML = `<span class="prompt">${content}</span><span class="cursor"></span>`;
        terminalBody.appendChild(lineDiv);
        terminalBody.scrollTop = terminalBody.scrollHeight;
        return lineDiv;
      } else if (type === 'command') {
        lineDiv.innerHTML = `<span class="prompt">[root@archiso ~]# </span><span class="command">${content}</span>`;
      } else {
        lineDiv.innerHTML = `<span class="output">${content}</span>`;
      }
      
      terminalBody.appendChild(lineDiv);
      terminalBody.scrollTop = terminalBody.scrollHeight;
      return lineDiv;
    }

    async function typeCommand(element, text, speed = 25) {
      isTyping = true;
      const span = element.querySelector('.command');
      if (!span) return;
      
      span.textContent = '';
      for (let i = 0; i < text.length; i++) {
        span.textContent += text[i];
        await new Promise(resolve => setTimeout(resolve, speed));
      }
      isTyping = false;
    }

    // Función para mostrar las certificaciones y pausar
    function showCertifications() {
      addLine('output', '');
      addLine('output', '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
      addLine('output', '  📜 CERTIFICATION STATUS REPORT — IN PROGRESS');
      addLine('output', '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
      addLine('output', '');
      
      // Crear grid de certificaciones
      const gridDiv = document.createElement('div');
      gridDiv.className = 'cert-grid';
      
      const certs = [
        { name: 'CCNA', status: 'In Progress', progress: 45, key: 'ccna' },
        { name: 'CCNP', status: 'In Progress', progress: 25, key: 'ccnp' },
        { name: 'OSCP', status: 'In Progress', progress: 60, key: 'oscp' },
        { name: 'CompTIA Security+', status: 'In Progress', progress: 35, key: 'security' }
      ];
      
      certs.forEach(cert => {
        const card = document.createElement('div');
        card.className = 'cert-card';
        card.setAttribute('data-cert', cert.key);
        card.onclick = () => openCertTab(cert.key);
        card.innerHTML = `
          <i class="fas fa-certificate" style="font-size: 1.8rem; color: #38bdf8; margin-bottom: 0.5rem; display: block;"></i>
          <div class="cert-name">${cert.name}</div>
          <span class="cert-status"><i class="fas fa-sync-alt" style="margin-right: 4px;"></i> ${cert.status}</span>
          <div class="cert-progress">
            <div class="cert-progress-bar" style="width: ${cert.progress}%"></div>
          </div>
          <div style="font-size: 0.65rem; margin-top: 0.5rem; color: #6c7a92;">${cert.progress}% complete — click to explore</div>
        `;
        gridDiv.appendChild(card);
      });
      
      terminalBody.appendChild(gridDiv);
      terminalBody.scrollTop = terminalBody.scrollHeight;
      
      // Mostrar pestañas después de las certificaciones
      setTimeout(() => {
        addLine('output', '');
        addLine('output', '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
        addLine('output', '  💡 Click on any certification above to view detailed knowledge base');
        addLine('output', '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
        addLine('output', '');
        addLine('prompt', '[root@archiso ~]# ');
        addLine('command', './cert_dashboard --interactive');
        addLine('output', '');
        addLine('output', '✅ Dashboard loaded. Certifications are interactive — click to explore!');
        addLine('prompt', '[root@archiso ~]# ');
        
        // Mostrar el contenido por defecto de CCNA
        openCertTab('ccna');
      }, 500);
    }

    // Función para abrir una pestaña de certificación
    function openCertTab(certKey) {
      const cert = certificationsData[certKey];
      if (!cert) return;
      
      // Mostrar tabs si están ocultos
      tabsContainer.style.display = 'flex';
      
      // Actualizar tabs activos
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('data-tab') === certKey) {
          btn.classList.add('active');
        }
      });
      
      // Crear o actualizar contenido
      let tabContent = document.getElementById(`tab-${certKey}`);
      if (!tabContent) {
        tabContent = document.createElement('div');
        tabContent.id = `tab-${certKey}`;
        tabContent.className = 'tab-content';
        terminalBody.appendChild(tabContent);
      }
      
      // Ocultar todos los contenidos y mostrar el actual
      document.querySelectorAll('.tab-content').forEach(tc => {
        tc.classList.remove('active');
      });
      
      // Generar contenido
      const complexityClass = {
        'junior': 'complexity-junior',
        'intermediate': 'complexity-intermediate',
        'advanced': 'complexity-advanced',
        'expert': 'complexity-expert'
      }[cert.complexityLevel] || 'complexity-intermediate';
      
      tabContent.innerHTML = `
        <div class="knowledge-section">
          <div class="knowledge-title">📋 ${cert.name} — Knowledge Base</div>
          <span class="complexity-badge ${complexityClass}">
            <i class="fas fa-chart-line"></i> Complexity: ${cert.complexity}
          </span>
          
          <div class="knowledge-title" style="margin-top: 1rem;">🛠️ Technologies Mastered</div>
          <div class="tech-tags">
            ${cert.technologies.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}
          </div>
          
          <div class="knowledge-title" style="margin-top: 1rem;">📚 Key Knowledge Areas</div>
          <ul class="knowledge-list">
            ${cert.knowledge.map(item => `<li>${item}</li>`).join('')}
          </ul>
          
          <div class="knowledge-title" style="margin-top: 1rem;">📊 Progress</div>
          <div class="cert-progress" style="margin: 0.5rem 0; max-width: 300px;">
            <div class="cert-progress-bar" style="width: ${cert.progress}%"></div>
          </div>
          <div style="font-size: 0.7rem; color: #6c7a92;">${cert.progress}% complete — estimated completion: ${getEstimatedCompletion(certKey)}</div>
        </div>
      `;
      
      tabContent.classList.add('active');
      terminalBody.scrollTop = terminalBody.scrollHeight;
    }
    
    function getEstimatedCompletion(certKey) {
      const dates = {
        ccna: 'Q3 2026',
        ccnp: 'Q3 2027',
        oscp: 'Q1 2027',
        security: 'Q4 2026'
      };
      return dates[certKey] || 'TBD';
    }

    async function animateTerminal() {
      for (let i = 0; i < bootLines.length; i++) {
        const line = bootLines[i];
        
        if (line.type === 'prompt') {
          addLine('prompt', line.content);
          await new Promise(resolve => setTimeout(resolve, 150));
        } else if (line.type === 'command') {
          const lineElement = addLine('command', '');
          const commandSpan = lineElement.querySelector('.command');
          if (commandSpan) {
            await typeCommand(lineElement, line.content, 18);
          }
          await new Promise(resolve => setTimeout(resolve, 250));
        } else {
          addLine('output', line.content);
          await new Promise(resolve => setTimeout(resolve, 40));
        }
      }
      
      // Pausa y muestra certificaciones
      await new Promise(resolve => setTimeout(resolve, 600));
      showCertifications();
    }

    // Configurar event listeners para tabs
    function setupTabListeners() {
      const tabs = document.querySelectorAll('.tab-btn');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          const certKey = tab.getAttribute('data-tab');
          openCertTab(certKey);
        });
      });
    }

    // Iniciar animación
    window.addEventListener('load', () => {
      setTimeout(() => {
        animateTerminal();
        setTimeout(setupTabListeners, 3000);
      }, 300);
    });
  </script>
</body>
</html>
