<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>0x21 · Arch Terminal · Certifications CLI</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c10;
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, #0a0c15, #020308);
      z-index: -2;
    }

    .bg-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    .glow-1 {
      position: absolute;
      top: 20%;
      left: 10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.12), transparent 70%);
      border-radius: 50%;
      filter: blur(60px);
      animation: floatGlow 12s ease-in-out infinite;
    }

    .glow-2 {
      position: absolute;
      bottom: 10%;
      right: 5%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.1), transparent 70%);
      border-radius: 50%;
      filter: blur(70px);
      animation: floatGlow 15s ease-in-out infinite reverse;
    }

    @keyframes floatGlow {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
      50% { transform: translate(30px, -20px) scale(1.1); opacity: 0.8; }
    }

    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .terminal-container {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .terminal-window {
      width: 95%;
      max-width: 1400px;
      height: 92vh;
      background: rgba(5, 8, 14, 0.94);
      backdrop-filter: blur(16px);
      border-radius: 1.5rem;
      border: 1px solid rgba(56, 189, 248, 0.4);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .terminal-header {
      background: rgba(12, 16, 24, 0.9);
      padding: 0.8rem 1.2rem;
      border-bottom: 1px solid rgba(56, 189, 248, 0.3);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-shrink: 0;
    }

    .window-controls {
      display: flex;
      gap: 0.5rem;
    }

    .window-control {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .close { background: #ff5f56; }
    .minimize { background: #ffbd2e; }
    .maximize { background: #27c93f; }

    .terminal-title {
      color: #6c7a92;
      font-size: 0.75rem;
      flex: 1;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .terminal-body {
      padding: 1.5rem;
      flex: 1;
      overflow-y: auto;
      font-size: 0.85rem;
      line-height: 1.6;
      scroll-behavior: smooth;
    }

    .terminal-body::-webkit-scrollbar {
      width: 8px;
    }
    .terminal-body::-webkit-scrollbar-track {
      background: #0f1219;
    }
    .terminal-body::-webkit-scrollbar-thumb {
      background: #2d4a6e;
      border-radius: 10px;
    }

    .line {
      margin-bottom: 0.5rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .prompt {
      color: #38bdf8;
      font-weight: 600;
    }

    .command {
      color: #eef2ff;
    }

    .output {
      color: #9aa9c1;
      margin-left: 1rem;
      border-left: 2px solid rgba(56, 189, 248, 0.3);
      padding-left: 1rem;
    }

    .output-indent {
      color: #9aa9c1;
      margin-left: 2rem;
      padding-left: 0.5rem;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 1rem;
      background-color: #38bdf8;
      vertical-align: middle;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 5px #38bdf8;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .cert-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      margin: 1.5rem 0;
    }

    .cert-card {
      background: rgba(8, 12, 18, 0.85);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 1rem;
      padding: 1.2rem;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .cert-card:hover {
      transform: translateY(-4px);
      border-color: #38bdf8;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.25);
      background: rgba(12, 18, 26, 0.95);
    }

    .cert-logo {
      width: 70px;
      height: 70px;
      margin: 0 auto 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(56, 189, 248, 0.1);
      border-radius: 50%;
      padding: 0.5rem;
    }

    .cert-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .cert-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 0.3rem;
    }

    .cert-status {
      font-size: 0.7rem;
      color: #facc15;
      background: rgba(250, 204, 21, 0.1);
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
    }

    .cert-progress {
      margin-top: 0.8rem;
      height: 4px;
      background: #1e2a3a;
      border-radius: 4px;
      overflow: hidden;
    }

    .cert-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #c084fc);
      width: 0%;
      border-radius: 4px;
      transition: width 1s ease;
    }

    .tech-tag {
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.65rem;
      display: inline-block;
      margin: 0.2rem;
    }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: #6c7a92;
      text-decoration: none;
      font-size: 0.75rem;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #38bdf8;
    }

    hr {
      border-color: rgba(56, 189, 248, 0.2);
      margin: 1rem 0;
    }

    @media (max-width: 768px) {
      .terminal-container { padding: 0.5rem; }
      .terminal-body { padding: 1rem; font-size: 0.7rem; }
      .cert-name { font-size: 1rem; }
      .cert-logo { width: 50px; height: 50px; }
    }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>
  <div class="bg-glow">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>
  <canvas id="particle-canvas"></canvas>

  <div class="terminal-container">
    <div class="terminal-window">
      <div class="terminal-header">
        <div class="window-controls">
          <div class="window-control close"></div>
          <div class="window-control minimize"></div>
          <div class="window-control maximize"></div>
        </div>
        <div class="terminal-title">0x21@archiso ~/certifications — CLI knowledge base</div>
      </div>
      
      <div class="terminal-body" id="terminalBody"></div>
    </div>
  </div>

  <script>
    // ========== PARTICLES BACKGROUND ==========
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.25;
        this.vy = (Math.random() - 0.5) * 0.18;
        this.size = Math.random() * 2;
        this.alpha = Math.random() * 0.3 + 0.1;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0) this.x = width;
        if (this.x > width) this.x = 0;
        if (this.y < 0) this.y = height;
        if (this.y > height) this.y = 0;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(56, 189, 248, ${this.alpha})`;
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < 80; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, width, height);
      for (let p of particles) {
        p.update();
        p.draw();
      }
      requestAnimationFrame(animateParticles);
    }

    initParticles();
    animateParticles();

    // ========== CERTIFICATION DATA ==========
    const certsData = {
      ccna: {
        name: 'CCNA',
        vendor: 'Cisco',
        logo: 'https://upload.wikimedia.org/wikipedia/commons/0/08/Cisco_logo_blue_2016.svg',
        progress: 45,
        complexity: 'Intermediate',
        estimated: 'Q3 2026',
        technologies: ['Cisco IOS', 'OSPF/EIGRP/BGP', 'VLANs/Trunking/STP', 'IPv4/IPv6', 'NAT/ACLs', 'Python Automation', 'Wireshark', 'SD-WAN basics'],
        knowledge: [
          'Network fundamentals and OSI model',
          'Ethernet switching and VLAN configuration',
          'IP routing and dynamic routing protocols',
          'Network security fundamentals',
          'WAN technologies and VPN basics',
          'Network automation with Python',
          'Troubleshooting methodologies'
        ]
      },
      ccnp: {
        name: 'CCNP',
        vendor: 'Cisco',
        logo: 'https://upload.wikimedia.org/wikipedia/commons/0/08/Cisco_logo_blue_2016.svg',
        progress: 25,
        complexity: 'Advanced',
        estimated: 'Q3 2027',
        technologies: ['Advanced OSPF/EIGRP/BGP', 'MPLS', 'DMVPN/FlexVPN', 'QoS', 'Cisco SD-WAN', 'Netmiko/NAPALM', 'RESTCONF/NETCONF', 'Multicast routing'],
        knowledge: [
          'Advanced routing and redistribution',
          'BGP route selection and manipulation',
          'MPLS and L3 VPNs',
          'Advanced switching (VXLAN, EVPN)',
          'Network programmability',
          'Cisco SD-WAN architecture',
          'Advanced network troubleshooting'
        ]
      },
      oscp: {
        name: 'OSCP',
        vendor: 'Offensive Security',
        logo: 'https://www.offensive-security.com/images/offsec-logo.svg',
        progress: 60,
        complexity: 'Advanced',
        estimated: 'Q1 2027',
        technologies: ['Kali Linux', 'Nmap', 'Metasploit', 'Burp Suite', 'Python Exploit Dev', 'Bash/PowerShell', 'Privilege Escalation', 'SQLmap', 'Netcat'],
        knowledge: [
          'Penetration testing methodologies',
          'Reconnaissance and OSINT',
          'Network scanning and enumeration',
          'Web application security (OWASP Top 10)',
          'Buffer overflow exploitation',
          'Windows/Linux privilege escalation',
          'Post-exploitation and pivoting',
          'Report writing and documentation'
        ]
      },
      security: {
        name: 'CompTIA Security+',
        vendor: 'CompTIA',
        logo: 'https://images.credly.com/images/f7e6b4b4-5f6a-4b6c-8b6c-8b6c8b6c8b6c/comptia-security-plus-logo.png',
        progress: 35,
        complexity: 'Intermediate',
        estimated: 'Q4 2026',
        technologies: ['Firewalls (pfSense/iptables)', 'IDS/IPS (Snort)', 'SIEM (Splunk)', 'PKI/SSL/TLS', 'VPN (IPsec/OpenVPN)', 'Linux/Windows Security', 'Nessus', 'Wireshark'],
        knowledge: [
          'Threats, vulnerabilities and attacks',
          'Identity and access management (IAM)',
          'Risk management and compliance',
          'Cryptography and PKI',
          'Network security architecture',
          'Incident response and forensics',
          'Security assessments and auditing',
          'Cloud and virtualization security'
        ]
      }
    };

    // ========== TERMINAL BOOT SEQUENCE ==========
    const terminalBody = document.getElementById('terminalBody');
    
    const bootLines = [
      { type: 'output', content: ':: Starting Arch Linux initialization...' },
      { type: 'output', content: ':: Loading kernel modules...' },
      { type: 'output', content: ':: Checking filesystems...' },
      { type: 'output', content: ':: Mounting filesystems...' },
      { type: 'output', content: ':: Starting networking services...' },
      { type: 'output', content: ':: Network interface: eth0 - [UP]' },
      { type: 'output', content: ':: DHCP lease acquired: 10.0.2.15' },
      { type: 'output', content: ':: Starting system logger...' },
      { type: 'output', content: ':: Starting cron daemon...' },
      { type: 'output', content: ':: Starting sshd... [OK]' },
      { type: 'output', content: '' },
      { type: 'prompt', content: 'Arch Linux 6.8.1-arch1-1 (tty1)' },
      { type: 'output', content: '' },
      { type: 'prompt', content: 'archiso login: ' },
      { type: 'command', content: 'root' },
      { type: 'output', content: 'Password: ********' },
      { type: 'output', content: '' },
      { type: 'prompt', content: `Last login: ${new Date().toLocaleString()} on tty1` },
      { type: 'output', content: '' },
      { type: 'prompt', content: '[root@archiso ~]# ' },
      { type: 'command', content: 'whoami' },
      { type: 'output', content: 'root' },
      { type: 'prompt', content: '[root@archiso ~]# ' },
      { type: 'command', content: 'hostname' },
      { type: 'output', content: 'archiso' },
      { type: 'prompt', content: '[root@archiso ~]# ' },
      { type: 'command', content: 'uname -a' },
      { type: 'output', content: 'Linux archiso 6.8.1-arch1-1 #1 SMP PREEMPT_DYNAMIC x86_64 GNU/Linux' },
      { type: 'prompt', content: '[root@archiso ~]# ' },
      { type: 'command', content: 'echo "Welcome, 0x21. Loading certification knowledge base..."' },
      { type: 'output', content: 'Welcome, 0x21. Loading certification knowledge base...' },
      { type: 'prompt', content: '[root@archiso ~]# ' },
      { type: 'command', content: './cert_display --interactive' }
    ];

    function addLine(type, content, indent = false) {
      const lineDiv = document.createElement('div');
      lineDiv.className = 'line';
      
      if (type === 'prompt') {
        lineDiv.innerHTML = `<span class="prompt">${content}</span><span class="cursor"></span>`;
      } else if (type === 'command') {
        lineDiv.innerHTML = `<span class="prompt">[root@archiso ~]# </span><span class="command">${content}</span>`;
      } else if (type === 'output-indent') {
        lineDiv.innerHTML = `<span class="output-indent">${content}</span>`;
      } else {
        lineDiv.innerHTML = `<span class="output">${content}</span>`;
      }
      
      terminalBody.appendChild(lineDiv);
      terminalBody.scrollTop = terminalBody.scrollHeight;
      return lineDiv;
    }

    async function typeCommand(element, text, speed = 20) {
      const span = element.querySelector('.command');
      if (!span) return;
      
      span.textContent = '';
      for (let i = 0; i < text.length; i++) {
        span.textContent += text[i];
        await new Promise(resolve => setTimeout(resolve, speed));
      }
    }

    // Mostrar grid de certificaciones (con logos)
    function showCertificationsGrid() {
      addLine('output', '');
      addLine('output', '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
      addLine('output', '  CERTIFICATION STATUS REPORT — IN PROGRESS');
      addLine('output', '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
      addLine('output', '');
      
      const gridDiv = document.createElement('div');
      gridDiv.className = 'cert-grid';
      
      const certList = [
        { key: 'ccna', name: 'CCNA', status: 'In Progress', progress: 45, logo: certsData.ccna.logo },
        { key: 'ccnp', name: 'CCNP', status: 'In Progress', progress: 25, logo: certsData.ccnp.logo },
        { key: 'oscp', name: 'OSCP', status: 'In Progress', progress: 60, logo: certsData.oscp.logo },
        { key: 'security', name: 'Security+', status: 'In Progress', progress: 35, logo: certsData.security.logo }
      ];
      
      certList.forEach(cert => {
        const card = document.createElement('div');
        card.className = 'cert-card';
        card.setAttribute('data-cert', cert.key);
        card.onclick = () => showCertDetails(cert.key);
        card.innerHTML = `
          <div class="cert-logo">
            <img src="${cert.logo}" alt="${cert.name} logo" onerror="this.src='https://placehold.co/70x70/0f172a/38bdf8?text=${cert.name}'">
          </div>
          <div class="cert-name">${cert.name}</div>
          <span class="cert-status">In Progress</span>
          <div class="cert-progress">
            <div class="cert-progress-bar" style="width: ${cert.progress}%"></div>
          </div>
          <div style="font-size: 0.65rem; margin-top: 0.5rem; color: #6c7a92;">${cert.progress}% complete — click to inspect</div>
        `;
        gridDiv.appendChild(card);
      });
      
      terminalBody.appendChild(gridDiv);
      terminalBody.scrollTop = terminalBody.scrollHeight;
      
      addLine('output', '');
      addLine('output', '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
      addLine('output', '  Select a certification above to view detailed CLI output');
      addLine('output', '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
      addLine('output', '');
      addLine('prompt', '[root@archiso ~]# ');
      addLine('command', './cert_display --waiting-selection');
      addLine('output', '');
      addLine('output', 'System ready. Click on any certification card to display details.');
      addLine('prompt', '[root@archiso ~]# ');
    }

    // Mostrar detalles de certificación como salida CLI
    function showCertDetails(certKey) {
      const cert = certsData[certKey];
      if (!cert) return;
      
      // Limpiar desde el último prompt (opcional, pero mejor mantener historial)
      // En lugar de limpiar, añadimos al final
      
      addLine('output', '');
      addLine('output', '┌─────────────────────────────────────────────────────────────────┐');
      addLine('output', `│  CERTIFICATION DETAILS: ${cert.name.padEnd(40)}│`);
      addLine('output', '├─────────────────────────────────────────────────────────────────┤');
      addLine('output', `│  Vendor:      ${cert.vendor.padEnd(45)}│`);
      addLine('output', `│  Complexity:  ${cert.complexity.padEnd(45)}│`);
      addLine('output', `│  Progress:    ${cert.progress}% (estimated completion: ${cert.estimated})${' '.padEnd(45 - (cert.progress.toString().length + cert.estimated.length + 17), ' ')}│`);
      addLine('output', '├─────────────────────────────────────────────────────────────────┤');
      addLine('output', '│  TECHNOLOGIES / TOOLS                                         │');
      addLine('output', '├─────────────────────────────────────────────────────────────────┤');
      
      // Tecnologías en múltiples líneas
      const techsPerLine = 3;
      for (let i = 0; i < cert.technologies.length; i += techsPerLine) {
        const techLine = cert.technologies.slice(i, i + techsPerLine).join('  ·  ');
        addLine('output', `│    ${techLine.padEnd(63)}│`);
      }
      
      addLine('output', '├─────────────────────────────────────────────────────────────────┤');
      addLine('output', '│  KNOWLEDGE AREAS                                              │');
      addLine('output', '├─────────────────────────────────────────────────────────────────┤');
      
      cert.knowledge.forEach(knowledge => {
        addLine('output', `│    - ${knowledge.padEnd(61)}│`);
      });
      
      addLine('output', '└─────────────────────────────────────────────────────────────────┘');
      addLine('output', '');
      addLine('output', `$ echo "Certificate: ${cert.name} — Complexity: ${cert.complexity} — Progress: ${cert.progress}%"`);
      addLine('output', `Certificate: ${cert.name} — Complexity: ${cert.complexity} — Progress: ${cert.progress}%`);
      addLine('output', '');
      addLine('prompt', '[root@archiso ~]# ');
      addLine('command', `cat /certifications/${certKey}/details.log`);
      addLine('output', `[INFO] Full details for ${cert.name} displayed above.`);
      addLine('prompt', '[root@archiso ~]# ');
      
      // Añadir enlace de vuelta al final si es necesario
      const existingBackLink = document.querySelector('.back-link');
      if (!existingBackLink) {
        const backLink = document.createElement('a');
        backLink.href = 'index.html';
        backLink.className = 'back-link';
        backLink.innerHTML = '<- Back to portfolio';
        terminalBody.appendChild(backLink);
      }
      
      terminalBody.scrollTop = terminalBody.scrollHeight;
    }

    async function animateTerminal() {
      for (let i = 0; i < bootLines.length; i++) {
        const line = bootLines[i];
        
        if (line.type === 'prompt') {
          addLine('prompt', line.content);
          await new Promise(resolve => setTimeout(resolve, 120));
        } else if (line.type === 'command') {
          const lineElement = addLine('command', '');
          const commandSpan = lineElement.querySelector('.command');
          if (commandSpan) {
            await typeCommand(lineElement, line.content, 15);
          }
          await new Promise(resolve => setTimeout(resolve, 200));
        } else {
          addLine('output', line.content);
          await new Promise(resolve => setTimeout(resolve, 35));
        }
      }
      
      await new Promise(resolve => setTimeout(resolve, 500));
      showCertificationsGrid();
    }

    window.addEventListener('load', () => {
      setTimeout(animateTerminal, 200);
    });
  </script>
</body>
</html>
