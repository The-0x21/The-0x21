
<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bento Glass | Creative Developer</title>
    
    <!-- Fuentes y Estilos Base -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Framer Motion (ESM) y React desde CDN -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "framer-motion": "https://esm.sh/framer-motion@10.16.4",
                "three": "https://esm.sh/three@0.128.0",
                "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.14.2",
                "@react-three/drei": "https://esm.sh/@react-three/drei@9.88.7"
            }
        }
    </script>
    
    <style>
        /* Configuración Base OLED + Custom Cursor */
        body {
            background-color: #000000;
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.02em;
            margin: 0;
            overflow-x: hidden;
            color: #ffffff;
            cursor: none;
        }
        
        /* Cursor Personalizado */
        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.2);
            border: 1.5px solid rgba(99, 102, 241, 0.8);
            pointer-events: none;
            z-index: 9999;
            transition: width 0.3s, height 0.3s, background 0.3s, border-color 0.3s, transform 0.1s;
            transform: translate(-50%, -50%);
            backdrop-filter: blur(2px);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }
        
        #cursor-dot {
            position: fixed;
            width: 5px;
            height: 5px;
            background: #ffffff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: opacity 0.2s;
        }
        
        /* Estilos para Magnetic Buttons y Tilt */
        .magnetic-wrapper {
            display: inline-block;
            transition: transform 0.1s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.1);
        }
        
        /* Borde Gradiente Animado */
        .border-glow {
            position: relative;
            background: #000;
            border-radius: 24px;
        }
        
        .border-glow::before {
            content: '';
            position: absolute;
            inset: -1.5px;
            border-radius: 25px;
            padding: 1.5px;
            background: linear-gradient(45deg, #4f46e5, #06b6d4, #4f46e5);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.3;
            transition: opacity 0.4s;
        }
        
        .border-glow:hover::before {
            opacity: 1;
            animation: borderRotate 4s linear infinite;
        }
        
        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        
        /* Texto con Máscara Gradiente */
        .text-mask {
            background: linear-gradient(135deg, #a5b4fc 0%, #67e8f9 50%, #a5b4fc 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 6s linear infinite;
        }
        
        @keyframes shine {
            to { background-position: 200% center; }
        }
        
        /* Scroll Snap y Smooth */
        html {
            scroll-behavior: smooth;
        }
        
        /* Marquee Animation */
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        .animate-marquee {
            animation: marquee 25s linear infinite;
        }
        
        /* Three.js Canvas */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }
    </style>
</head>
<body class="bg-black">

    <!-- Canvas para Three.js (Fondo 3D) -->
    <div id="canvas-container"></div>
    
    <!-- Custom Cursor -->
    <div id="cursor"></div>
    <div id="cursor-dot"></div>

    <!-- Contenedor React -->
    <div id="root"></div>

    <script type="text/babel">
        // =============================================
        // 1. IMPORTACIONES Y CONFIGURACIÓN
        // =============================================
        const { useState, useEffect, useRef, useMemo, Suspense } = React;
        const { motion, useAnimation, useInView, useMotionValue, useSpring, useTransform, AnimatePresence } = framerMotion;
        
        // Three.js Imports
        const { Canvas, useFrame, useThree } = ReactThreeFiber;
        const { Points, PointMaterial, OrbitControls } = Drei;
        
        // =============================================
        // 2. UTILIDADES (Tailwind Merge Simplificada)
        // =============================================
        function cn(...classes) {
            return classes.filter(Boolean).join(' ');
        }

        // =============================================
        // 3. COMPONENTE: FONDO DE PARTÍCULAS THREE.JS
        // =============================================
        const ParticleField = () => {
            const points = useRef();
            const { viewport } = useThree();
            
            // Generar posiciones aleatorias en una esfera / nube
            const particlesPosition = useMemo(() => {
                const positions = new Float32Array(1500 * 3);
                for (let i = 0; i < 1500; i++) {
                    const r = 3.5 + Math.random() * 4;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos((Math.random() * 2) - 1);
                    
                    const x = r * Math.sin(phi) * Math.cos(theta);
                    const y = r * Math.sin(phi) * Math.sin(theta);
                    const z = r * Math.cos(phi);
                    
                    positions[i * 3] = x;
                    positions[i * 3 + 1] = y * 0.6; // Aplanar un poco
                    positions[i * 3 + 2] = z;
                }
                return positions;
            }, []);
            
            useFrame((state, delta) => {
                if (points.current) {
                    points.current.rotation.y += 0.0005;
                    points.current.rotation.x += 0.0002;
                }
            });
            
            return (
                <Points ref={points} positions={particlesPosition} stride={3} frustumCulled={false}>
                    <PointMaterial 
                        transparent 
                        color="#6366f1" 
                        size={0.012} 
                        sizeAttenuation={true} 
                        depthWrite={false} 
                        blending={2} 
                    />
                </Points>
            );
        };
        
        const Scene3D = () => {
            return (
                <Canvas camera={{ position: [0, 0, 8], fov: 75 }}>
                    <Suspense fallback={null}>
                        <ParticleField />
                        <OrbitControls enableZoom={false} enablePan={false} enableRotate={false} />
                    </Suspense>
                </Canvas>
            );
        };

        // =============================================
        // 4. COMPONENTES UI: CURSOR Y MAGNETIC BUTTON
        // =============================================
        const useCustomCursor = () => {
            useEffect(() => {
                const cursor = document.getElementById('cursor');
                const cursorDot = document.getElementById('cursor-dot');
                
                const moveCursor = (e) => {
                    const { clientX, clientY } = e;
                    cursor.style.left = `${clientX}px`;
                    cursor.style.top = `${clientY}px`;
                    cursorDot.style.left = `${clientX}px`;
                    cursorDot.style.top = `${clientY}px`;
                };
                
                const handleMouseOver = (e) => {
                    const target = e.target.closest('a, button, .magnetic, .glass-card');
                    if (target) {
                        cursor.style.width = '50px';
                        cursor.style.height = '50px';
                        cursor.style.background = 'rgba(99, 102, 241, 0.1)';
                        cursor.style.borderColor = '#06b6d4';
                        cursorDot.style.opacity = '0.5';
                    }
                };
                
                const handleMouseOut = () => {
                    cursor.style.width = '20px';
                    cursor.style.height = '20px';
                    cursor.style.background = 'rgba(99, 102, 241, 0.2)';
                    cursor.style.borderColor = 'rgba(99, 102, 241, 0.8)';
                    cursorDot.style.opacity = '1';
                };
                
                window.addEventListener('mousemove', moveCursor);
                document.addEventListener('mouseover', handleMouseOver);
                document.addEventListener('mouseout', handleMouseOut);
                
                return () => {
                    window.removeEventListener('mousemove', moveCursor);
                    document.removeEventListener('mouseover', handleMouseOver);
                    document.removeEventListener('mouseout', handleMouseOut);
                };
            }, []);
        };
        
        const MagneticButton = ({ children, href, className }) => {
            const ref = useRef(null);
            const x = useMotionValue(0);
            const y = useMotionValue(0);
            
            const springX = useSpring(x, { stiffness: 150, damping: 15 });
            const springY = useSpring(y, { stiffness: 150, damping: 15 });
            
            const handleMouseMove = (e) => {
                if (!ref.current) return;
                const rect = ref.current.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const distanceX = (e.clientX - centerX) * 0.4;
                const distanceY = (e.clientY - centerY) * 0.4;
                x.set(distanceX);
                y.set(distanceY);
            };
            
            const handleMouseLeave = () => {
                x.set(0);
                y.set(0);
            };
            
            return (
                <motion.div
                    ref={ref}
                    onMouseMove={handleMouseMove}
                    onMouseLeave={handleMouseLeave}
                    style={{ x: springX, y: springY }}
                    className={cn("inline-block magnetic-wrapper", className)}
                >
                    <a 
                        href={href} 
                        className="block px-8 py-3 rounded-full border border-indigo-500/30 bg-white/5 backdrop-blur-sm text-white font-medium hover:bg-indigo-500/10 transition-colors"
                    >
                        {children}
                    </a>
                </motion.div>
            );
        };

        const SectionWrapper = ({ children, id, className }) => {
            const ref = useRef(null);
            const isInView = useInView(ref, { once: true, margin: "-100px" });
            
            return (
                <motion.section
                    id={id}
                    ref={ref}
                    initial={{ opacity: 0, y: 50 }}
                    animate={isInView ? { opacity: 1, y: 0 } : {}}
                    transition={{ duration: 0.8, ease: [0.16, 1, 0.3, 1] }}
                    className={cn("min-h-screen w-full max-w-7xl mx-auto px-6 py-24 relative z-10", className)}
                >
                    {children}
                </motion.section>
            );
        };

        // =============================================
        // 5. SECCIÓN HERO
        // =============================================
        const Hero = () => {
            const titleRef = useRef(null);
            const isInView = useInView(titleRef, { once: true });
            
            const containerVariants = {
                hidden: { opacity: 0 },
                visible: {
                    opacity: 1,
                    transition: { staggerChildren: 0.12, delayChildren: 0.3 }
                }
            };
            
            const itemVariants = {
                hidden: { y: 100, opacity: 0 },
                visible: {
                    y: 0,
                    opacity: 1,
                    transition: { duration: 0.8, ease: [0.6, 0.01, -0.05, 0.95] }
                }
            };
            
            return (
                <section className="relative h-screen flex items-center justify-center overflow-hidden">
                    <div className="absolute inset-0 z-0 opacity-30">
                        <Scene3D />
                    </div>
                    
                    <div className="relative z-10 text-center max-w-5xl mx-auto px-6">
                        <motion.div
                            ref={titleRef}
                            variants={containerVariants}
                            initial="hidden"
                            animate={isInView ? "visible" : "hidden"}
                            className="space-y-6"
                        >
                            <motion.div variants={itemVariants} className="overflow-hidden pb-2">
                                <span className="text-sm uppercase tracking-[0.3em] text-indigo-400/80 font-semibold">Creative Technologist</span>
                            </motion.div>
                            
                            <motion.h1 variants={itemVariants} className="overflow-hidden">
                                <span className="block text-7xl md:text-8xl lg:text-9xl font-black tracking-tighter leading-[1.1] text-mask">
                                    Bento<br />Glass Lab
                                </span>
                            </motion.h1>
                            
                            <motion.p variants={itemVariants} className="text-lg md:text-xl text-white/50 max-w-2xl mx-auto font-light tracking-wide">
                                Diseño de interacción de alta gama. Fronteras entre el código, la luz y el movimiento.
                            </motion.p>
                            
                            <motion.div variants={itemVariants} className="flex gap-6 justify-center pt-8">
                                <MagneticButton href="#projects">Ver Proyectos</MagneticButton>
                                <MagneticButton href="#contact">Contacto</MagneticButton>
                            </motion.div>
                        </motion.div>
                    </div>
                    
                    <div className="absolute bottom-12 left-1/2 -translate-x-1/2 animate-bounce">
                        <div className="w-6 h-10 rounded-full border border-white/20 flex justify-center">
                            <div className="w-1 h-2 bg-white/60 rounded-full mt-2 animate-pulse"></div>
                        </div>
                    </div>
                </section>
            );
        };

        // =============================================
        // 6. SECCIÓN PROJECTS (BENTO GRID + TILT 3D)
        // =============================================
        const ProjectCard = ({ title, description, size = "medium", index }) => {
            const cardRef = useRef(null);
            const x = useMotionValue(0);
            const y = useMotionValue(0);
            
            const rotateX = useTransform(y, [-300, 300], [15, -15]);
            const rotateY = useTransform(x, [-300, 300], [-15, 15]);
            
            const handleMouseMove = (e) => {
                if (!cardRef.current) return;
                const rect = cardRef.current.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                x.set(e.clientX - centerX);
                y.set(e.clientY - centerY);
            };
            
            const handleMouseLeave = () => {
                x.set(0);
                y.set(0);
            };
            
            const sizeClasses = {
                large: "md:col-span-2 md:row-span-2",
                medium: "md:col-span-1 md:row-span-1",
                tall: "md:col-span-1 md:row-span-2"
            };
            
            return (
                <motion.div
                    ref={cardRef}
                    onMouseMove={handleMouseMove}
                    onMouseLeave={handleMouseLeave}
                    style={{ rotateX, rotateY, transformPerspective: 1000 }}
                    className={cn(
                        "glass-card border-glow p-8 flex flex-col justify-between cursor-pointer magnetic",
                        sizeClasses[size]
                    )}
                    initial={{ opacity: 0, y: 40 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true, margin: "-50px" }}
                    transition={{ duration: 0.5, delay: index * 0.1 }}
                >
                    <div>
                        <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500/30 to-cyan-500/30 mb-6 border border-white/10"></div>
                        <h3 className="text-2xl font-bold tracking-tight mb-3 text-white/90">{title}</h3>
                        <p className="text-white/40 text-sm leading-relaxed">{description}</p>
                    </div>
                    <div className="mt-6 flex items-center text-xs font-medium uppercase tracking-wider text-indigo-400">
                        <span>Explorar proyecto</span>
                        <svg className="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                        </svg>
                    </div>
                </motion.div>
            );
        };
        
        const Projects = () => {
            const projects = [
                { title: "ARIA Quantum", description: "Sistema de diseño con inteligencia contextual y gradientes cinéticos.", size: "large" },
                { title: "Eclipse OS", description: "Interfaz de usuario holográfica para entornos inmersivos.", size: "medium" },
                { title: "NOVA Edge", description: "Plataforma de edge computing con visualización en tiempo real.", size: "tall" },
                { title: "Flux Engine", description: "Motor de físicas para animaciones web de alto rendimiento.", size: "medium" },
                { title: "Prism Data", description: "Herramienta de análisis con shaders personalizados.", size: "medium" }
            ];
            
            return (
                <SectionWrapper id="projects">
                    <div className="mb-16">
                        <motion.span 
                            initial={{ opacity: 0, x: -20 }}
                            whileInView={{ opacity: 1, x: 0 }}
                            className="text-sm uppercase tracking-[0.3em] text-indigo-400/80"
                        >
                            Laboratorio
                        </motion.span>
                        <motion.h2 
                            initial={{ opacity: 0, y: 20 }}
                            whileInView={{ opacity: 1, y: 0 }}
                            className="text-5xl md:text-6xl font-black tracking-tighter mt-4 text-mask"
                        >
                            Bento Grid<br />Experimental
                        </motion.h2>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 auto-rows-[200px]">
                        {projects.map((project, i) => (
                            <ProjectCard key={i} {...project} index={i} />
                        ))}
                    </div>
                </SectionWrapper>
            );
        };

        // =============================================
        // 7. SECCIÓN SKILLS (MARQUEE INFINITO)
        // =============================================
        const Skills = () => {
            const skills = [
                "React 18", "Three.js", "WebGL", "Framer Motion", "Tailwind CSS", 
                "Node.js", "TypeScript", "Rust", "SwiftUI", "Python", "WebAssembly", 
                "GraphQL", "D3.js", "GSAP", "Blender", "Figma"
            ];
            
            const doubledSkills = [...skills, ...skills];
            
            return (
                <SectionWrapper id="skills" className="!py-16 overflow-hidden">
                    <div className="mb-16">
                        <motion.span 
                            initial={{ opacity: 0 }}
                            whileInView={{ opacity: 1 }}
                            className="text-sm uppercase tracking-[0.3em] text-indigo-400/80 block text-center"
                        >
                            Stack Infinito
                        </motion.span>
                    </div>
                    
                    <div className="relative">
                        <div className="absolute left-0 top-0 bottom-0 w-32 bg-gradient-to-r from-black to-transparent z-10"></div>
                        <div className="absolute right-0 top-0 bottom-0 w-32 bg-gradient-to-l from-black to-transparent z-10"></div>
                        
                        <motion.div 
                            className="flex gap-12 py-12 animate-marquee"
                            initial={{ opacity: 0 }}
                            whileInView={{ opacity: 1 }}
                            transition={{ duration: 0.8 }}
                        >
                            {doubledSkills.map((skill, i) => (
                                <span 
                                    key={i} 
                                    className="text-7xl md:text-8xl font-black text-white/5 hover:text-white/20 transition-all duration-500 whitespace-nowrap tracking-tighter"
                                    style={{ WebkitTextStroke: '1px rgba(255,255,255,0.1)' }}
                                >
                                    {skill}
                                </span>
                            ))}
                        </motion.div>
                    </div>
                </SectionWrapper>
            );
        };

        // =============================================
        // 8. SECCIÓN CONTACTO
        // =============================================
        const Contact = () => {
            const [formState, setFormState] = useState({ name: '', email: '', message: '' });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isSuccess, setIsSuccess] = useState(false);
            
            const handleSubmit = (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                setTimeout(() => {
                    setIsSubmitting(false);
                    setIsSuccess(true);
                    setTimeout(() => setIsSuccess(false), 3000);
                    setFormState({ name: '', email: '', message: '' });
                }, 1500);
            };
            
            return (
                <SectionWrapper id="contact">
                    <div className="grid md:grid-cols-2 gap-16 items-center">
                        <motion.div
                            initial={{ opacity: 0, x: -30 }}
                            whileInView={{ opacity: 1, x: 0 }}
                        >
                            <span className="text-sm uppercase tracking-[0.3em] text-indigo-400/80">Conectemos</span>
                            <h2 className="text-5xl md:text-6xl font-black tracking-tighter mt-4 mb-6 text-mask">
                                Iniciar<br />una órbita.
                            </h2>
                            <p className="text-white/40 text-lg leading-relaxed">
                                ¿Tienes un proyecto que desafía los límites de la web? Escríbeme.
                            </p>
                        </motion.div>
                        
                        <motion.form 
                            onSubmit={handleSubmit}
                            className="space-y-6 glass-card p-8 border-glow"
                            initial={{ opacity: 0, x: 30 }}
                            whileInView={{ opacity: 1, x: 0 }}
                        >
                            <div>
                                <input 
                                    type="text" 
                                    placeholder="Nombre"
                                    value={formState.name}
                                    onChange={(e) => setFormState({...formState, name: e.target.value})}
                                    className="w-full bg-transparent border-b border-white/10 py-4 px-2 text-white placeholder-white/30 focus:outline-none focus:border-indigo-500/50 transition-colors"
                                    required
                                />
                            </div>
                            <div>
                                <input 
                                    type="email" 
                                    placeholder="Email"
                                    value={formState.email}
                                    onChange={(e) => setFormState({...formState, email: e.target.value})}
                                    className="w-full bg-transparent border-b border-white/10 py-4 px-2 text-white placeholder-white/30 focus:outline-none focus:border-indigo-500/50 transition-colors"
                                    required
                                />
                            </div>
                            <div>
                                <textarea 
                                    placeholder="Mensaje"
                                    rows="4"
                                    value={formState.message}
                                    onChange={(e) => setFormState({...formState, message: e.target.value})}
                                    className="w-full bg-transparent border-b border-white/10 py-4 px-2 text-white placeholder-white/30 focus:outline-none focus:border-indigo-500/50 transition-colors resize-none"
                                    required
                                ></textarea>
                            </div>
                            
                            <div className="pt-4">
                                <button 
                                    type="submit"
                                    disabled={isSubmitting}
                                    className={cn(
                                        "w-full py-4 rounded-full font-medium transition-all duration-300 relative overflow-hidden",
                                        "bg-gradient-to-r from-indigo-600 to-cyan-600 text-white",
                                        "hover:shadow-[0_0_30px_rgba(6,182,212,0.4)]",
                                        "disabled:opacity-50 disabled:cursor-not-allowed"
                                    )}
                                >
                                    <AnimatePresence mode="wait">
                                        {isSubmitting ? (
                                            <motion.span key="loading" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                                                Enviando...
                                            </motion.span>
                                        ) : isSuccess ? (
                                            <motion.span key="success" initial={{ opacity: 0, scale: 0.8 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0 }}>
                                                ¡Mensaje Enviado! ✓
                                            </motion.span>
                                        ) : (
                                            <motion.span key="idle" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                                                Transmitir Señal
                                            </motion.span>
                                        )}
                                    </AnimatePresence>
                                </button>
                            </div>
                        </motion.form>
                    </div>
                    
                    <div className="mt-24 text-center text-white/20 text-sm">
                        <p>© 2026 Bento Glass Lab. Todos los derechos reservados.</p>
                        <p className="mt-2">Construido con React, Three.js y Framer Motion.</p>
                    </div>
                </SectionWrapper>
            );
        };

        // =============================================
        // 9. COMPONENTE PRINCIPAL APP
        // =============================================
        const App = () => {
            useCustomCursor();
            
            return (
                <main className="relative">
